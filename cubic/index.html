<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="src/style.css">
  <title>Cubic Solver</title>
</head>

<body>
  <div id="app">
    <h1>Cubic Solver</h1>
    <form id="cubic-form">
      <label for="a-value">a-value:</label>
      <input type="number" id="a-value" name="a-value">
      <label for="b-value">b-value:</label>
      <input type="number" id="b-value" name="b-value">
      <label for="c-value">c-value:</label>
      <input type="number" id="c-value" name="c-value">
      <label for="d-value">d-value:</label>
      <input type="number" id="d-value" name="d-value">
      <input type="submit" id="solve-cubic" value="Solve Cubic">
    </form>
    <div id="results">
    <table id="roots-table">
      <thead>
        <tr>
          <td>Value</td>
          <th>x</th>
          <th>y</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>p</td>
          <td id="p-table"></td>
        </tr>
        <tr>
          <td>q</td>
          <td id="q-table"></td>
        </tr>
        <tr>
          <td>Discriminant</td>
          <td id="discriminant-table"></td>
        </tr>
        <tr>
          <td>Root 1</td>
          <td id="root1-table"></td>
          <td>0</td>
        </tr>
        <tr>
          <td>Root 2</td>
          <td id="root2-table"></td>
          <td>0</td>
        </tr>
        <tr>
          <td>Root 3</td>
          <td id="root3-table"></td>
          <td>0</td>
        </tr>
      </tbody>
    </table>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
